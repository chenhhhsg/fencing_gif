<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fencing GIF Gallery</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      padding: 32px 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 12px;
      font-size: 32px;
    }

    p.subtitle {
      text-align: center;
      margin-top: 0;
      margin-bottom: 32px;
      color: #bbb;
      font-size: 16px;
    }

    .gallery {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
    }

    .card {
      background: #1b1b1b;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    .card img {
      width: 100%;
      border-radius: 12px;
      display: block;
      background: #000;
    }

    .card h2 {
      margin: 14px 0 8px;
      font-size: 20px;
    }

    .card p {
      margin: 0;
      color: #ccc;
      line-height: 1.5;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Fencing GIF Gallery</h1>
  <p class="subtitle">A collection of fencing motion GIFs</p>

  <div class="gallery">
    <div class="card">
      <img src="trajectory_smc_rl.gif" alt="Trajectory SMC RL" />
      <h2>Trajectory SMC RL</h2>
      <p>This GIF shows the trajectory result of the fencing motion experiment.</p>
    </div>

    <div class="card">
      <img src="trajectory_satellite.gif" alt="trajectory_satellite" />
      <h2>Second GIF</h2>
      <p>Add your description here.</p>
    </div>

  </div>
</body>
</html>
